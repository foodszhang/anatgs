model:
  use_tcnn: true
  time_enc: pe
  time_n_freqs: 8
  hidden_dim: 128
  use_signal: false
  signal_dim: 5
  use_motion_field: false
  use_svf: false
  svf_steps: 7
  max_velocity: 0.10
  hash_levels: 16
  hash_feat_per_level: 4
  hash_log2_size: 22
  hash_base_resolution: 16
  hash_per_level_scale: 1.2945

train:
  iterations: 2000
  batch_size: 4096
  lr: 0.001
  n_samples: 128
  lambda_temporal: 0.0
  projection_mode: line_integral
  lambda_contrast: 0.0
  lambda_bi: 0.0
  lambda_mf: 0.0
  contrast_ref_volume: ""
  contrast_points: 0
  contrast_interval: 1
  bi_interval: 20
  bi_samples: 4
  bi_volume_res: 28
  manifold_warmup: 100
  manifold_points: 0
  eval_every: 500
  save_every: 2000
