model:
  use_tcnn: true
  time_enc: pe
  time_n_freqs: 8
  hidden_dim: 128
  use_signal: true
  signal_dim: 5
  use_motion_field: true
  use_svf: false
  svf_steps: 7
  max_velocity: 0.10
  hash_levels: 16
  hash_feat_per_level: 2
  hash_log2_size: 19
  hash_base_resolution: 16
  hash_per_level_scale: 1.4472

train:
  iterations: 2000
  batch_size: 2048
  lr: 0.001
  n_samples: 96
  lambda_temporal: 0.001
  projection_mode: line_integral
  lambda_contrast: 0.0
  lambda_bi: 0.0
  lambda_mf: 0.001
  bi_interval: 20
  bi_samples: 4
  bi_volume_res: 24
  manifold_warmup: 100
  manifold_points: 4096
  eval_every: 100
  save_every: 500
