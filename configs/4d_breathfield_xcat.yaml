model:
  use_tcnn: true
  time_enc: pe
  time_n_freqs: 8
  hidden_dim: 128
  use_signal: true
  signal_dim: 5
  use_motion_field: true
  use_svf: true
  svf_steps: 7
  max_velocity: 0.10
  hash_levels: 16
  hash_feat_per_level: 2
  hash_log2_size: 19
  hash_base_resolution: 16
  hash_per_level_scale: 1.4472

train:
  iterations: 30000
  batch_size: 3072
  lr: 0.001
  n_samples: 128
  lambda_temporal: 0.001
  projection_mode: line_integral
  lambda_contrast: 0.0
  lambda_bi: 0.02
  lambda_mf: 0.001
  bi_interval: 20
  bi_samples: 4
  bi_volume_res: 28
  bi_mode: shroud
  manifold_warmup: 100
  manifold_points: 8192
  eval_every: 500
  save_every: 2000

profiles:
  lung_default:
    hash_levels: 16
    hash_feat_per_level: 2
    hash_log2_size: 19
    hash_base_resolution: 16
    hash_per_level_scale: 1.4472
  xcat_canonical_c4:
    hash_levels: 16
    hash_feat_per_level: 4
    hash_log2_size: 22
    hash_base_resolution: 16
    hash_per_level_scale: 1.2945
