model:
  use_tcnn: true
  time_enc: pe
  time_n_freqs: 8
  hidden_dim: 128
  hash_levels: 16
  hash_feat_per_level: 2
  hash_log2_size: 19
  hash_base_resolution: 16
  hash_per_level_scale: 1.4472

train:
  iterations: 50000
  batch_size: 4096
  lr: 0.001
  n_samples: 128
  lambda_temporal: 0.001
  projection_mode: line_integral
  lambda_contrast: 0.0
  contrast_ref_volume: ""
  contrast_points: 8192
  contrast_interval: 10
  eval_every: 1000
  save_every: 5000
