model:
  use_tcnn: true
  time_enc: pe
  time_n_freqs: 8
  hidden_dim: 128
  use_signal: false
  signal_dim: 5
  use_motion_field: false
  use_svf: false
  svf_steps: 7
  max_velocity: 0.10
  hash_levels: 16
  hash_feat_per_level: 2
  hash_log2_size: 19
  hash_base_resolution: 16
  hash_per_level_scale: 1.4472

train:
  iterations: 2000
  batch_size: 2048
  lr: 0.001
  n_samples: 96
  lambda_temporal: 0.001
  projection_mode: line_integral
  grad_clip: 1.0
  projection_scale: 100.0
  lambda_contrast: 0.0
  lambda_bi: 0.0
  lambda_mf: 0.0
  contrast_ref_volume: ""
  contrast_points: 8192
  contrast_interval: 10
  eval_every: 100
  save_every: 500
